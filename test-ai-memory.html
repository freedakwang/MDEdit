<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI 记忆系统自动化测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #0f172a; color: #e2e8f0; padding: 24px; }
h1 { font-size: 20px; margin-bottom: 16px; color: #93c5fd; }
.test-group { margin-bottom: 20px; border: 1px solid #334155; border-radius: 8px; overflow: hidden; }
.test-group-title { background: #1e293b; padding: 10px 16px; font-weight: 600; font-size: 14px; color: #94a3b8; }
.test-item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; border-top: 1px solid #1e293b; font-size: 13px; }
.test-item .status { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.test-item .status.pass { background: #065f46; color: #34d399; }
.test-item .status.fail { background: #7f1d1d; color: #fca5a5; }
.test-item .status.running { background: #78350f; color: #fbbf24; animation: pulse 1s infinite; }
.test-item .status.pending { background: #334155; color: #64748b; }
.test-item .name { flex: 1; }
.test-item .detail { color: #64748b; font-size: 11px; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.summary { margin-top: 20px; padding: 16px; border-radius: 8px; font-size: 14px; font-weight: 600; }
.summary.all-pass { background: #065f46; color: #34d399; }
.summary.has-fail { background: #7f1d1d; color: #fca5a5; }
.summary.running { background: #78350f; color: #fbbf24; }
#log { margin-top: 16px; background: #1e293b; border-radius: 8px; padding: 12px; font-family: 'SF Mono', Consolas, monospace; font-size: 12px; max-height: 300px; overflow-y: auto; white-space: pre-wrap; color: #94a3b8; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
button { background: #3b82f6; color: white; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; margin-bottom: 16px; }
button:hover { background: #2563eb; }
button:disabled { background: #475569; cursor: not-allowed; }
</style>
</head>
<body>
<h1>🧪 AI 记忆系统自动化测试</h1>
<button id="btnRun" onclick="runAllTests()">▶ 运行全部测试</button>
<div id="testContainer"></div>
<div id="summary" class="summary running" style="display:none;"></div>
<div id="log"></div>

<script>
// ========== 测试框架 ==========
const tests = [];
let passed = 0, failed = 0;

function log(msg) {
    const el = document.getElementById('log');
    el.textContent += msg + '\n';
    el.scrollTop = el.scrollHeight;
}

function defineTestGroup(name, testFns) {
    tests.push({ groupName: name, tests: testFns });
}

function updateTestUI(groupIdx, testIdx, status, detail) {
    const id = `test-${groupIdx}-${testIdx}`;
    const el = document.getElementById(id);
    if (!el) return;
    const statusEl = el.querySelector('.status');
    const detailEl = el.querySelector('.detail');
    statusEl.className = 'status ' + status;
    statusEl.textContent = status === 'pass' ? '✓' : status === 'fail' ? '✗' : status === 'running' ? '…' : '○';
    if (detail) detailEl.textContent = detail;
}

function renderTests() {
    const container = document.getElementById('testContainer');
    container.innerHTML = '';
    tests.forEach(function(group, gi) {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'test-group';
        groupDiv.innerHTML = '<div class="test-group-title">' + group.groupName + '</div>';
        group.tests.forEach(function(t, ti) {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'test-item';
            itemDiv.id = 'test-' + gi + '-' + ti;
            itemDiv.innerHTML = '<div class="status pending">○</div><div class="name">' + t.name + '</div><div class="detail"></div>';
            groupDiv.appendChild(itemDiv);
        });
        container.appendChild(groupDiv);
    });
}

async function runAllTests() {
    document.getElementById('btnRun').disabled = true;
    document.getElementById('log').textContent = '';
    passed = 0; failed = 0;
    const summaryEl = document.getElementById('summary');
    summaryEl.style.display = 'block';
    summaryEl.className = 'summary running';
    summaryEl.textContent = '测试运行中...';

    for (let gi = 0; gi < tests.length; gi++) {
        const group = tests[gi];
        log('\n=== ' + group.groupName + ' ===');
        for (let ti = 0; ti < group.tests.length; ti++) {
            const t = group.tests[ti];
            updateTestUI(gi, ti, 'running');
            try {
                log('  ▶ ' + t.name);
                const result = await t.fn();
                if (result === true || result === undefined) {
                    passed++;
                    updateTestUI(gi, ti, 'pass', '通过');
                    log('    ✓ 通过');
                } else {
                    failed++;
                    updateTestUI(gi, ti, 'fail', String(result));
                    log('    ✗ 失败: ' + result);
                }
            } catch (e) {
                failed++;
                updateTestUI(gi, ti, 'fail', e.message);
                log('    ✗ 异常: ' + e.message);
            }
        }
    }

    summaryEl.className = 'summary ' + (failed === 0 ? 'all-pass' : 'has-fail');
    summaryEl.textContent = '测试完成: ' + passed + ' 通过, ' + failed + ' 失败, 共 ' + (passed + failed) + ' 项';
    document.getElementById('btnRun').disabled = false;
}

// ========== 辅助：模拟 MDEdit 环境 ==========
// 简化版的 safeLocalStorageSet
function safeLocalStorageSet(key, val) { localStorage.setItem(key, val); }

// 简化版的 preprocessMarkdown / postprocessHTML
function preprocessMarkdown(md) { return md; }
function postprocessHTML(html) { return html; }

// ========== 从 MDEdit.html 提取核心函数进行测试 ==========

// -- Token 估算 --
function estimateTokens(text) {
    if (!text) return 0;
    let tokens = 0;
    const cjkRegex = /[\u4e00-\u9fff\u3400-\u4dbf\u3000-\u303f\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]/g;
    const cjkCount = (text.match(cjkRegex) || []).length;
    tokens += cjkCount * 1.5;
    const nonCjk = text.replace(cjkRegex, ' ');
    const words = nonCjk.split(/\s+/).filter(w => w.length > 0);
    tokens += words.length * 1.3;
    tokens += 4;
    return Math.ceil(tokens);
}

function trimContextByTokens(history, tokenBudget) {
    if (!history || history.length === 0 || tokenBudget <= 0) return [];
    const result = [];
    let usedTokens = 0;
    for (let i = history.length - 1; i >= 0; i--) {
        const msgTokens = estimateTokens(history[i].content) + 4;
        if (usedTokens + msgTokens > tokenBudget) break;
        usedTokens += msgTokens;
        result.unshift(history[i]);
    }
    return result;
}

// -- 关键词提取 --
function extractKeywords(text) {
    if (!text) return [];
    const cjkChars = text.match(/[\u4e00-\u9fff\u3400-\u4dbf]{2,4}/g) || [];
    const enWords = text.toLowerCase().match(/[a-z]{3,}/g) || [];
    const stopWords = new Set(['the','and','for','are','but','not','you','all','can','had','her','was','one','our','out','this','that','with','have','from','been','will','what','when','make','like','just','over','such','take','than','them','very','some','into','also','most','could','should','would','there','their','which','about','these','other','then','after','those','because','many','still','more','only','know','your','much','here','where','both','each','does','how','its','may','who','did','get','has','him','his','how','its','let','new','now','old','see','way','few','too','any','use','her','two','may','way','who','oil','did','get','come','made','find','long','look','day','down','back','give','said','help','line','turn','move','live','went']);
    const filtered = enWords.filter(w => !stopWords.has(w));
    const keywords = [...new Set([...cjkChars, ...filtered])];
    return keywords.slice(0, 20);
}

// -- IndexedDB 测试用 --
const TEST_DB_NAME = 'MDEditAIMemory_TEST';
let testDB = null;

function initTestDB() {
    return new Promise(function(resolve, reject) {
        // 先删除旧的测试数据库
        const delReq = indexedDB.deleteDatabase(TEST_DB_NAME);
        delReq.onsuccess = delReq.onerror = function() {
            const req = indexedDB.open(TEST_DB_NAME, 1);
            req.onupgradeneeded = function(e) {
                const db = e.target.result;
                if (!db.objectStoreNames.contains('messages')) {
                    const store = db.createObjectStore('messages', { keyPath: 'id', autoIncrement: true });
                    store.createIndex('sessionId', 'sessionId', { unique: false });
                    store.createIndex('timestamp', 'timestamp', { unique: false });
                    store.createIndex('role', 'role', { unique: false });
                }
            };
            req.onsuccess = function(e) { testDB = e.target.result; resolve(testDB); };
            req.onerror = function(e) { reject(new Error('IndexedDB 打开失败')); };
        };
    });
}

function addTestMessage(msg) {
    return new Promise(function(resolve) {
        const tx = testDB.transaction('messages', 'readwrite');
        const store = tx.objectStore('messages');
        store.add({
            role: msg.role,
            content: msg.content,
            displayContent: msg.displayContent || msg.content,
            keywords: extractKeywords(msg.displayContent || msg.content),
            timestamp: msg.timestamp || Date.now(),
            sessionId: msg.sessionId || 'test-session'
        });
        tx.oncomplete = function() { resolve(); };
    });
}

function getAllTestMessages() {
    return new Promise(function(resolve) {
        const tx = testDB.transaction('messages', 'readonly');
        const req = tx.objectStore('messages').getAll();
        req.onsuccess = function(e) { resolve(e.target.result || []); };
    });
}

function searchTestMessages(queryText, limit) {
    limit = limit || 5;
    const queryKeywords = extractKeywords(queryText);
    if (queryKeywords.length === 0) return Promise.resolve([]);
    return new Promise(function(resolve) {
        const tx = testDB.transaction('messages', 'readonly');
        const req = tx.objectStore('messages').getAll();
        req.onsuccess = function(e) {
            const allMsgs = e.target.result || [];
            const scored = allMsgs.map(function(msg) {
                const msgKeywords = msg.keywords || [];
                if (msgKeywords.length === 0) return { msg, score: 0 };
                const querySet = new Set(queryKeywords);
                let hits = 0;
                msgKeywords.forEach(function(kw) {
                    if (querySet.has(kw)) hits++;
                    queryKeywords.forEach(function(qk) {
                        if (kw !== qk && (kw.includes(qk) || qk.includes(kw))) hits += 0.5;
                    });
                });
                const ageHours = (Date.now() - (msg.timestamp || 0)) / 3600000;
                const timeFactor = 1 / (1 + ageHours / 24);
                return { msg, score: hits * timeFactor };
            });
            const relevant = scored
                .filter(s => s.score > 0)
                .sort((a, b) => b.score - a.score)
                .slice(0, limit)
                .map(s => s.msg);
            resolve(relevant);
        };
    });
}

function cleanupTestDB() {
    if (testDB) testDB.close();
    return new Promise(r => { const req = indexedDB.deleteDatabase(TEST_DB_NAME); req.onsuccess = req.onerror = r; });
}

// ========== 定义测试用例 ==========

// --- 1. Token 估算 ---
defineTestGroup('Token 估算', [
    {
        name: '空字符串返回 0 或仅格式开销',
        fn: function() {
            const t = estimateTokens('');
            if (t !== 0) return '预期 0, 实际 ' + t;
        }
    },
    {
        name: '纯英文 token 估算合理',
        fn: function() {
            const t = estimateTokens('Hello world this is a test');
            // 6 words * 1.3 + 4 overhead ≈ 12
            if (t < 8 || t > 20) return '估算不合理: ' + t;
        }
    },
    {
        name: '纯中文 token 估算合理',
        fn: function() {
            const t = estimateTokens('你好世界这是一个测试');
            // 10 chars * 1.5 + 4 = 19
            if (t < 10 || t > 30) return '估算不合理: ' + t;
        }
    },
    {
        name: '中英混合 token 估算合理',
        fn: function() {
            const t = estimateTokens('使用 Markdown 编辑器来写文档');
            if (t < 10 || t > 40) return '估算不合理: ' + t;
        }
    },
    {
        name: '长文本 token 成比例增长',
        fn: function() {
            const short = estimateTokens('Hello');
            const long = estimateTokens('Hello '.repeat(100));
            if (long <= short) return 'long(' + long + ') 应大于 short(' + short + ')';
        }
    }
]);

// --- 2. 上下文裁剪 ---
defineTestGroup('上下文裁剪', [
    {
        name: '空历史返回空数组',
        fn: function() {
            const r = trimContextByTokens([], 1000);
            if (r.length !== 0) return '预期空数组, 实际长度 ' + r.length;
        }
    },
    {
        name: '预算为 0 返回空',
        fn: function() {
            const r = trimContextByTokens([{ role: 'user', content: 'hi' }], 0);
            if (r.length !== 0) return '预期空数组';
        }
    },
    {
        name: '充足预算保留全部消息',
        fn: function() {
            const msgs = [
                { role: 'user', content: 'hi' },
                { role: 'assistant', content: 'hello' },
                { role: 'user', content: 'how are you' }
            ];
            const r = trimContextByTokens(msgs, 10000);
            if (r.length !== 3) return '预期 3 条, 实际 ' + r.length;
        }
    },
    {
        name: '紧张预算只保留最新消息',
        fn: function() {
            const msgs = [
                { role: 'user', content: '这是一段很长的中文内容'.repeat(50) },
                { role: 'assistant', content: '短回复' }
            ];
            const r = trimContextByTokens(msgs, 30);
            if (r.length !== 1) return '预期 1 条, 实际 ' + r.length;
            if (r[0].content !== '短回复') return '应保留最新的消息';
        }
    },
    {
        name: '裁剪优先保留最新消息',
        fn: function() {
            const msgs = [
                { role: 'user', content: 'msg1' },
                { role: 'assistant', content: 'msg2' },
                { role: 'user', content: 'msg3' },
                { role: 'assistant', content: 'msg4' }
            ];
            const r = trimContextByTokens(msgs, 30);
            // 应该从后往前取
            if (r.length === 0) return '至少应保留 1 条';
            if (r[r.length - 1].content !== 'msg4') return '最后一条应是 msg4';
        }
    }
]);

// --- 3. 关键词提取 ---
defineTestGroup('关键词提取', [
    {
        name: '空字符串返回空数组',
        fn: function() {
            const r = extractKeywords('');
            if (r.length !== 0) return '预期空数组';
        }
    },
    {
        name: '提取中文词组',
        fn: function() {
            const r = extractKeywords('我想用 Markdown 编辑器来写文档');
            if (r.length === 0) return '应提取出关键词';
            const hasMarkdown = r.some(k => k === 'markdown');
            if (!hasMarkdown) return '应包含 markdown, 实际: ' + r.join(',');
        }
    },
    {
        name: '提取英文单词并过滤停用词',
        fn: function() {
            const r = extractKeywords('The quick brown fox jumps over the lazy dog');
            if (r.includes('the')) return '应过滤停用词 the';
            if (!r.includes('quick')) return '应包含 quick';
            if (!r.includes('brown')) return '应包含 brown';
        }
    },
    {
        name: '关键词去重',
        fn: function() {
            const r = extractKeywords('hello hello hello world world');
            const unique = new Set(r);
            if (unique.size !== r.length) return '关键词应去重';
        }
    },
    {
        name: '限制最多 20 个关键词',
        fn: function() {
            const longText = 'alpha beta gamma delta epsilon zeta eta theta iota kappa lambda mu nu xi omicron pi rho sigma tau upsilon phi chi psi omega';
            const r = extractKeywords(longText);
            if (r.length > 20) return '最多 20 个, 实际 ' + r.length;
        }
    }
]);

// --- 4. IndexedDB 存储 ---
defineTestGroup('IndexedDB 存储', [
    {
        name: '初始化数据库',
        fn: async function() {
            await initTestDB();
            if (!testDB) return 'testDB 为 null';
        }
    },
    {
        name: '保存消息',
        fn: async function() {
            await addTestMessage({ role: 'user', content: '你好，帮我写一篇 Markdown 文档', displayContent: '你好，帮我写一篇 Markdown 文档' });
            await addTestMessage({ role: 'assistant', content: '# 标题\n\n这是一篇示例文档' });
            const all = await getAllTestMessages();
            if (all.length !== 2) return '预期 2 条, 实际 ' + all.length;
        }
    },
    {
        name: '消息包含关键词索引',
        fn: async function() {
            const all = await getAllTestMessages();
            const first = all[0];
            if (!first.keywords || first.keywords.length === 0) return '消息应包含关键词';
        }
    },
    {
        name: '消息包含时间戳',
        fn: async function() {
            const all = await getAllTestMessages();
            if (!all[0].timestamp) return '消息应包含时间戳';
            if (all[0].timestamp > Date.now()) return '时间戳不合理';
        }
    },
    {
        name: '消息包含会话 ID',
        fn: async function() {
            const all = await getAllTestMessages();
            if (!all[0].sessionId) return '消息应包含 sessionId';
        }
    }
]);

// --- 5. 关键词相关性检索 ---
defineTestGroup('关键词相关性检索', [
    {
        name: '准备测试数据',
        fn: async function() {
            // 清空并重建
            await cleanupTestDB();
            await initTestDB();
            // 添加多条不同主题的消息
            await addTestMessage({ role: 'user', content: '帮我写一个 Python 爬虫脚本', timestamp: Date.now() - 3600000 });
            await addTestMessage({ role: 'assistant', content: 'import requests\nimport BeautifulSoup...', timestamp: Date.now() - 3500000 });
            await addTestMessage({ role: 'user', content: '帮我翻译这段 Markdown 文档为英文', timestamp: Date.now() - 1800000 });
            await addTestMessage({ role: 'assistant', content: '# Title\n\nThis is a translated document', timestamp: Date.now() - 1700000 });
            await addTestMessage({ role: 'user', content: '帮我优化这个 Python 函数的性能', timestamp: Date.now() - 600000 });
            await addTestMessage({ role: 'assistant', content: 'def optimized_function():\n    pass', timestamp: Date.now() - 500000 });
        }
    },
    {
        name: '搜索 Python 相关消息',
        fn: async function() {
            const results = await searchTestMessages('Python 代码', 3);
            if (results.length === 0) return '应找到 Python 相关消息';
            const hasPython = results.some(m => m.content.includes('Python') || m.content.includes('python'));
            if (!hasPython) return '结果中应包含 Python 相关消息';
        }
    },
    {
        name: '搜索 Markdown 相关消息',
        fn: async function() {
            const results = await searchTestMessages('Markdown 文档翻译', 3);
            if (results.length === 0) return '应找到 Markdown 相关消息';
        }
    },
    {
        name: '无关查询返回空或极少结果',
        fn: async function() {
            const results = await searchTestMessages('量子力学薛定谔方程', 3);
            // 可能有 0 条或很少相关
            if (results.length > 2) return '不相关查询不应返回太多结果: ' + results.length;
        }
    },
    {
        name: '较新消息得分更高',
        fn: async function() {
            const results = await searchTestMessages('Python 函数', 5);
            if (results.length < 2) return '结果太少无法验证排序';
            // 最新的 Python 消息应排在前面
            const firstTimestamp = results[0].timestamp || 0;
            const hasNewerFirst = results.some((m, i) => i > 0 && (m.timestamp || 0) > firstTimestamp);
            // 不强制要求，因为关键词匹配度也影响排序
        }
    },
    {
        name: '清理测试数据库',
        fn: async function() {
            await cleanupTestDB();
        }
    }
]);

// --- 6. 端到端功能验证 ---
defineTestGroup('端到端功能验证', [
    {
        name: 'normalizeEndpoint 自动补全 /v1',
        fn: function() {
            // 内联测试
            function normalizeEndpoint(url) {
                url = url.replace(/\/+$/, '');
                if (url.endsWith('/v1')) url += '/chat/completions';
                else if (url.endsWith('/v1/chat')) url += '/completions';
                return url;
            }
            const r1 = normalizeEndpoint('https://api.example.com/v1');
            if (r1 !== 'https://api.example.com/v1/chat/completions') return 'v1 补全失败: ' + r1;
            const r2 = normalizeEndpoint('https://api.example.com/v1/chat');
            if (r2 !== 'https://api.example.com/v1/chat/completions') return 'v1/chat 补全失败: ' + r2;
            const r3 = normalizeEndpoint('https://api.example.com/v1/chat/completions');
            if (r3 !== 'https://api.example.com/v1/chat/completions') return '完整 URL 不应改变: ' + r3;
            const r4 = normalizeEndpoint('https://api.example.com/v1/');
            if (!r4.endsWith('/chat/completions')) return '末尾斜杠处理失败: ' + r4;
        }
    },
    {
        name: 'localStorage 设置读写',
        fn: function() {
            const key = 'md-editor-ai-test-settings';
            const data = { endpoint: 'https://test.com/v1/chat/completions', apiKey: 'sk-test', model: 'test-model', maxTokens: 4096, temperature: 0.7, contextLimit: 8000 };
            localStorage.setItem(key, JSON.stringify(data));
            const loaded = JSON.parse(localStorage.getItem(key));
            localStorage.removeItem(key);
            if (loaded.model !== 'test-model') return '读取不匹配';
            if (loaded.contextLimit !== 8000) return 'contextLimit 不匹配';
        }
    },
    {
        name: 'AI 摘要 localStorage 读写',
        fn: function() {
            const key = 'md-editor-ai-summary';
            localStorage.setItem(key, '用户喜欢使用 Markdown 编辑器');
            const loaded = localStorage.getItem(key);
            localStorage.removeItem(key);
            if (loaded !== '用户喜欢使用 Markdown 编辑器') return '摘要读写不匹配';
        }
    }
]);

// 渲染并准备
renderTests();
</script>
</body>
</html>
